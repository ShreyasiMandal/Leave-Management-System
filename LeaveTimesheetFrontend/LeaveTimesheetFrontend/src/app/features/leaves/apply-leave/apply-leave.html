<app-navbar></app-navbar>
<div class="layout">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <div class="page-header">
      <h1>Apply for Leave</h1>
      <a routerLink="/leaves" class="btn-back">← Back to My Leaves</a>
    </div>

    <div class="form-card">
      <div class="success-msg" *ngIf="success">✅ {{ success }}</div>
      <div class="error-msg"   *ngIf="error">❌ {{ error }}</div>

      <div class="form-grid">
        <div class="form-group">
          <label>Leave Type *</label>
          <select [(ngModel)]="form.leaveTypeId" class="form-control">
            <option value="0" disabled>Select leave type</option>
            <option *ngFor="let t of leaveTypes" [value]="t.id">
              {{ t.name }} (Max: {{ t.maxDaysPerYear }} days)
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Session</label>
          <select [(ngModel)]="form.halfDaySession" class="form-control">
            <option value="Full">Full Day</option>
            <option value="Morning">Morning Half</option>
            <option value="Afternoon">Afternoon Half</option>
          </select>
        </div>

        <div class="form-group">
          <label>Start Date *</label>
          <input type="date" [(ngModel)]="form.startDate" class="form-control"/>
        </div>

        <div class="form-group">
          <label>End Date *</label>
          <input type="date" [(ngModel)]="form.endDate" class="form-control"/>
        </div>
      </div>

      <div class="form-group">
        <label>Reason *</label>
        <textarea
          [(ngModel)]="form.reason"
          class="form-control"
          rows="3"
          placeholder="Enter reason for leave...">
        </textarea>
      </div>

      <div class="form-actions">
        <button class="btn-submit" (click)="onSubmit()" [disabled]="loading">
          {{ loading ? 'Submitting...' : 'Submit Leave Request' }}
        </button>
        <a routerLink="/leaves" class="btn-cancel">Cancel</a>
      </div>
    </div>
  </main>
</div>
