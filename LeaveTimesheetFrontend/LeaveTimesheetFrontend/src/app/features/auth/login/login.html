<div class="login-page">

  <div class="login-card">

    <div class="login-header">
      <div class="brand-logo">
  <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Calendar body -->
    <rect x="4" y="10" width="44" height="38" rx="4" fill="white" opacity="0.9"/>
    <!-- Calendar top bar -->
    <rect x="4" y="10" width="44" height="12" rx="4" fill="white" opacity="0.5"/>
    <!-- Rings -->
    <rect x="14" y="5" width="4" height="10" rx="2" fill="white"/>
    <rect x="34" y="5" width="4" height="10" rx="2" fill="white"/>
    <!-- Grid dots -->
    <rect x="12" y="28" width="5" height="5" rx="1" fill="#2563a8"/>
    <rect x="22" y="28" width="5" height="5" rx="1" fill="#2563a8"/>
    <rect x="32" y="28" width="5" height="5" rx="1" fill="#2563a8"/>
    <rect x="12" y="38" width="5" height="5" rx="1" fill="#2563a8"/>
    <rect x="22" y="38" width="5" height="5" rx="1" fill="#2563a8"/>
    <!-- Person circle -->
    <circle cx="50" cy="46" r="14" fill="#38bdf8"/>
    <circle cx="50" cy="42" r="5" fill="white"/>
    <ellipse cx="50" cy="54" rx="7" ry="5" fill="white"/>
  </svg>
</div>
      <h1 class="brand-title">LTMA</h1>
      <p class="brand-sub">Leave & Timesheet Management</p>
    </div>

    <div class="role-tabs">
      <button
        *ngFor="let r of roles"
        class="role-tab"
        [class.active]="selectedRole === r"
        (click)="selectedRole = r"
        type="button">
        {{ r }}
      </button>
    </div>

    <div class="login-body">
      <h2 class="sign-in-title">Welcome back 👋</h2>
      <p class="sign-in-subtitle">Sign in to your account to continue</p>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="Enter your email"
          class="form-control"
          [class.input-error]="error"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter your password"
            class="form-control"
            [class.input-error]="error"
            (keyup.enter)="onLogin()"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="eye-btn"
            (click)="showPassword = !showPassword"
            tabindex="-1">
            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8
                a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112
                4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07
                a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" *ngIf="error">
        {{ error }}
      </div>

      <button
        class="btn-signin"
        (click)="onLogin()"
        [disabled]="loading || !selectedRole">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <div class="login-links">
        <a routerLink="/forgot-password">Forgot Password?</a>
        <a routerLink="/first-login">First Login? Change Password</a>
      </div>
    </div>

  </div>
</div>
