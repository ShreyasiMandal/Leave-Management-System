<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1>LTMA</h1>
      <p>First Login — Set Your Password</p>
    </div>

    <div class="auth-body">
      <div class="info-box">
        🔐 Your account was created by HR.
        Please enter your temporary password and set a new one.
      </div>

      <div class="error-msg" *ngIf="error">❌ {{ error }}</div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="form.email"
          class="form-control" placeholder="Your email" />
      </div>

      <div class="form-group">
        <label>Temporary Password</label>
        <input type="password" [(ngModel)]="form.tempPassword"
          class="form-control" placeholder="From welcome email" />
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" [(ngModel)]="form.newPassword"
          class="form-control" placeholder="Choose a strong password" />
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" [(ngModel)]="form.confirmPassword"
          class="form-control" placeholder="Repeat new password" />
      </div>

      <button class="btn-primary" (click)="onSubmit()"
        [disabled]="loading">
        {{ loading ? 'Setting password...' : 'Set Password & Login' }}
      </button>

      <div class="back-link">
        <a routerLink="/login">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
