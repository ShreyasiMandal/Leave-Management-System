<nav class="navbar">
  <div class="navbar-brand">
    <span class="brand-text">LTMA</span>
    <span class="brand-sub">Leave & Timesheet</span>
  </div>

  <div class="navbar-right">
    <a routerLink="/notifications" class="notif-btn">
      🔔
      <span class="badge" *ngIf="unreadCount > 0">
        {{ unreadCount }}
      </span>
    </a>

    <div class="user-info">
      <span class="user-name">{{ fullName }}</span>
      <span class="user-role">{{ role }}</span>
    </div>

    <button class="btn-logout" (click)="logout()">
      Logout
    </button>
  </div>
</nav>
